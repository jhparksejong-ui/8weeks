<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentry 에러 추적 실습</title>
    
    <script src="https://js-de.sentry-cdn.com/fc15a90b7300f0220ed36810f246ed7c.min.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f0f0f0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; margin-top: 20px;}
        .btn-error { background: #e00; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold;}
        .btn-error:hover { background: #c00; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sentry 연동 테스트</h1>
        <p>복잡한 설정 없이 스크립트 1줄로 에러를 추적합니다</p>
        
        <button class="btn-error" onclick="triggerError()">치명적인 에러 발생시키기 💣</button>
    </div>

    <script>
        // 에러를 발생시키는 자바스크립트 함수
        function triggerError() {
            // 브레드크럼브(사용자 행동 기록)에 남길 로그
            console.log("💣 사용자가 에러 발생 버튼을 클릭했습니다");
            
            // 선언되지 않은 함수를 억지로 호출하여 ReferenceError를 강제 유발함
            callUndefinedFunction(); 
        }
    </script>
</body>
</html>
